# Case form happy path
# Logs a basic hand surgery case end-to-end.
# Pre-conditions:
#   - User is logged in (use TESTING.local.md credentials before running)
#   - At least one facility configured
#
# Run: maestro test .maestro/case-form-happy.yaml
appId: com.drgladysz.opus
---
- launchApp:
    clearState: false
- assertVisible:
    id: "screen-dashboard"

# Open Add Case via FAB speed dial. "Log a Case" opens the specialty
# picker (AddCaseScreen); choosing a specialty card opens the case form.
- tapOn:
    id: "dashboard.fab.btn-main"
- tapOn:
    id: "dashboard.fab.btn-log"
- assertVisible:
    id: "screen-addCase"
- tapOn:
    id: "addCase.card-hand_wrist"
- assertVisible:
    id: "screen-caseForm"

# Verify all six section pills are present
- assertVisible:
    id: "caseForm.nav.pill-patient"
- assertVisible:
    id: "caseForm.nav.pill-team"
- assertVisible:
    id: "caseForm.nav.pill-case"
- assertVisible:
    id: "caseForm.nav.pill-operative"
- assertVisible:
    id: "caseForm.nav.pill-media"
- assertVisible:
    id: "caseForm.nav.pill-outcomes"

# Patient section: enter identifier
- tapOn:
    id: "caseForm.nav.pill-patient"
- assertVisible:
    id: "section-patient"
- tapOn:
    id: "caseForm.patient.input-identifier"
    optional: true
- inputText: "TST0001"

# Discard the test case rather than saving — we're just smoke-testing
# the form mounts and accepts input. The save path needs richer fixture
# data and is the territory of `case-form-save-end-to-end.yaml` (TODO).
#
# Exit: dismiss the keyboard first (a raw `back` is absorbed by the
# keyboard and does nothing), then back out. The case form sits one
# level below AddCaseScreen, so two backs are needed; a discard
# confirmation may appear in between.
# NOTE: the discard-dialog button label was not confirmable this session
# ("Discard" is a best guess) — verify and tighten if it doesn't dismiss.
- tapOn:
    text: "Done"
    optional: true
- back

# Confirm discard, then back out of AddCaseScreen to the dashboard
- tapOn:
    text: "Discard"
    optional: true
- back
- assertVisible:
    id: "screen-dashboard"
