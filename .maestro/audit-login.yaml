# Audit: sign in via the dev-only opus://debug/login deep link.
#
# Bypasses EmailSignupScreen entirely. iOS's "Use Strong Password?" sheet
# intercepts the password TextInput during scripted sign-in — only the first
# keystroke reaches React state, so every form login returns 401.
# DevDeepLinkHandler (rendered in App.tsx behind `__DEV__`) listens for the
# deep link and calls AuthContext login() directly. Real users keep the
# normal form.
#
# stopApp first: opening the URL against a STOPPED app is a cold launch — the
# URL arrives via Linking.getInitialURL(). Depending on launch timing iOS may
# still raise its "Open in <app>?" confirmation, so tap through it if shown.
appId: com.drgladysz.opus
---
- stopApp
- openLink: "opus://debug/login"
- waitForAnimationToEnd

# Tap through iOS's "Open in <app>?" confirmation if it appears.
- runFlow:
    when:
      visible:
        text: "Open"
    commands:
      - tapOn:
          text: "Open"

# App-lock may or may not be configured. If the lock overlay shows, key in
# the test PIN (1111).
- runFlow:
    when:
      visible:
        id: "screen-lock"
    commands:
      - tapOn: "1"
      - tapOn: "1"
      - tapOn: "1"
      - tapOn: "1"

- extendedWaitUntil:
    visible:
      id: "screen-dashboard"
    timeout: 60000

- takeScreenshot: /tmp/opus-audit/login-dashboard
